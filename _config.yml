      path: "license.md"
    values:
      title: "MIT-style license"

include:
  - license.md

exclude:
  - README.md
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
